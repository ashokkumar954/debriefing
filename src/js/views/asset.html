<!-- src/js/views/asset.html -->
<div class="cc-plugin">

    <!-- ── LANDING VIEW ── -->
    <div data-bind="ifnot: showAllAssets">
        <div class="cc-landing">
            <div class="cc-landing-title">Battery PM</div>
            <div class="cc-landing-sub">Asset service management</div>

            <div data-bind="ifnot: hasOptions">
                <div class="cc-banner-warn">
                    <strong>No problem_code values received from OFSC.</strong><br>
                    Please ensure <em>problem_code</em> is added to plugin Properties
                    with Read or Read/Write access.
                </div>
            </div>

            <div data-bind="if: hasOptions">
                <div class="cc-banner-ok">
                    <strong style="color:#3a7030;">&#10003; Problem codes loaded &mdash; </strong>
                    <span data-bind="text: problemCodeCount"></span> asset type(s) available.
                </div>
                <button class="cc-primary-btn" data-bind="click: navigateToAllAssets">
                    View All Asset Details &rarr;
                </button>
            </div>
        </div>
    </div>

    <!-- ── ALL ASSETS INLINE VIEW ── -->
    <div data-bind="if: showAllAssets" style="width:100%;">

        <div class="cc-header">
            <button class="cc-back-btn" data-bind="click: goBack">&#8592;</button>
            <span class="cc-h-title">Battery PM</span>
            <span class="cc-h-badge" data-bind="text: problemCodeCount() + ' asset(s)'"></span>
        </div>

        <div class="cc-toolbar">
            <span class="cc-tb-title">Asset Details</span>
            <span class="cc-tb-spacer"></span>
            <button class="cc-icon-btn" title="Refresh"
                    data-bind="click: function(){ if(typeof AllAssetDetails!=='undefined') AllAssetDetails.render('all-assets-inline-container', _enumValues); }">
                &#8635;
            </button>
        </div>

        <div class="cc-cards-wrap">
            <div id="all-assets-inline-container">
                <div class="cc-no-data">Loading asset details&hellip;</div>
            </div>
        </div>

    </div>

</div>
